services:
  - type: web
    name: active-recall-backend
    env: python
    buildCommand: "uv venv --clear && uv pip install -e ."
    startCommand: "uv run uvicorn note_taker.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
