services:
  - type: web
    name: active-recall-backend
    env: python
    buildCommand: "uv sync"
    startCommand: ".venv/bin/uvicorn note_taker.api.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
